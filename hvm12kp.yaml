    #   name: "last qpiri"
    # last_qmod:
    #   name: "last qmod"
    # last_qflag:
    #   name: "last qflag"
    # last_qpigs2:
    #   name: "last qpigs2"
    # last_qbatcd:
    #   name: "last qbatcd"

    device_mode:
      id: ${name}_device_mode
