######################################################################################
#
#            ESPHome Project for PowMr POW-HVM12KP Inverter
#
#                        Dave Prue <dave@prue.com>
#
######################################################################################

substitutions:
  name: "inverter"
  friendly_name: "HVM12KP"
  device_description: "Monitor & Control Inverter via PIP over RS232 port"
  tx_pin: GPIO17
  rx_pin: GPIO16
  baud_rate: '2400'
  version: "1.01"

esphome:
  name: ${name}
  friendly_name: ${friendly_name}
  comment: ${device_description}
  min_version: 2024.6.0
  name_add_mac_suffix: False
  project:
    name: "Dave Prue.PowMr HVM12KP Inverter"
    version: ${version}

packages:
  remote_package:
    url: https://github.com/daveprue/esphome-local.git
    ref: main
    files:
      - packages/WiFi-Diagnostics.yaml
    refresh: 30s

esp32:
  board: esp32dev
  flash_size: 16MB
  framework:
    type: esp-idf
    advanced:
      minimum_chip_revision: "3.1"
      sram1_as_iram: true
 
external_components:
  source: github://daveprue/pipsolar
  components: [ pip8048 ]
  refresh: 5s

logger:
  level: ERROR
  #level: DEBUG
  baud_rate: 0
  #logs:
  #  pip4048: DEBUG
  #   number: ERROR
  #   sensor: ERROR
api:

#improv_serial:

wifi:
  ap:
    ssid: "HVM12KP Inverter"
#  ssid: !secret wifi_ssid
#  password: !secret wifi_password

captive_portal:

dashboard_import:
  package_import_url: github://esphome/example-configs/esphome-web/esp32.yaml@main
  import_full_config: true

http_request:
  useragent: esphome/device
  timeout: 10s

ota:
  - platform: esphome
  - platform: http_request

update:
  - platform: http_request
    name: "Firmware Update"
    source: github://daveprue/PowMr/hvm12kp.ota.bin
    
esp32_improv:
  authorizer: none

web_server:

uart:
  id: uart_0
  tx_pin: ${tx_pin}
  rx_pin: ${rx_pin}
  baud_rate: ${baud_rate}
  debug:
    direction: BOTH
    dummy_receiver: false
    after:
      delimiter: "\r"
    sequence:
      - lambda: UARTDebug::log_string(direction, bytes);

time:
  - platform: sntp

status_led:
    pin: 
      number: GPIO02
      ignore_strapping_warning: true
      inverted: true

pip8048:
  id: inverter0
  uart_id: uart_0
  update_interval: 5.0s

light:
  - platform: binary
    name: "Ready LED"
    id: ready_led
    internal: true
    output: output_ready_led
    restore_mode: ALWAYS_OFF
  

#---------------------------------------------------------------------------------------------------------------------------------------------------

sensor:
  - platform: pip8048
    pipsolar_id: inverter0

    grid_voltage:
      name: "Grid Voltage"
      id: ${name}_grid_voltage

    grid_frequency:
      name: "Grid Frequency"
      id: ${name}_grid_frequency

    ac_output_voltage:
      name: "AC Output Voltage"
      id: ${name}_ac_output_voltage

    ac_output_frequency:
      name: "AC Output Frequency"
      id: ${name}_ac_output_frequency

    ac_output_apparent_power:
      name: "AC Output Apparent Power"
      id: ${name}_ac_output_apparent_power

    ac_output_active_power:
      name: "AC Output Active Power"
      id: ${name}_ac_output_active_power

  - platform: template
    name: "AC Output Current"
    id: ${name}_ac_output_current
    unit_of_measurement: "A"
    device_class: current
    state_class: measurement
    accuracy_decimals: 0
    update_interval: 5.0s
    lambda: |-
        float power = id(${name}_ac_output_active_power).state;
        float volts = id(${name}_ac_output_voltage).state;
        float current = 0.0;
        
        // Handle potential NaN/Invalid sensor readings safely
        if (std::isnan(power)) power = 0.0;
        if (std::isnan(volts)) volts = 0.0;

        if (volts > 0) current = power / volts;
        return current;

  - platform: pip8048
    pipsolar_id: inverter0
  
    output_load_percent:
      name: "Output Load Percent"
      id: ${name}_output_load_percent

    bus_voltage:
      name: "Bus Voltage"
      id: ${name}_bus_voltage

    battery_voltage:
      name: "Battery Voltage"
      id: ${name}_battery_voltage

    battery_charging_current:
      name: "Battery Charge Current"
      id: ${name}_battery_charging_current

  #  battery_capacity_percent:
  #    name: "Battery Capacity Percent"
  #    id: ${name}_battery_capacity_percent

    inverter_heat_sink_temperature:
      name: "Heat Sink Temperature"
      id: ${name}_heat_sink_temperature

    pv1_input_current:
      name: "PV1 Input Current"
      id: pv1_input_current

    pv1_input_voltage:
      name: "PV1 Input Voltage"
      id: pv1_input_voltage

    battery_voltage_scc:
      name: "Battery Voltage SCC"
      id: ${name}_batterry_voltage_scc

    battery_discharge_current:
      name: "Battery Discharge Current"
      id: ${name}_battery_discharge_current

    battery_voltage_offset_for_fans_on:
      name: "Battery Voltage Fans Offset"
      id: ${name}_battery_voltage_fans_offset

    pv2_input_current:
      name: "PV2 Input Current"
      id: pv2_input_current

    pv_total_power:
      name: "PV Total Power"
      id: pv_total_power

    # QPIRI Data

    grid_rating_voltage:
      id: ${name}_grid_rating_voltage
      name: "Rated Grid Voltage"
      accuracy_decimals: 0

    grid_rating_current:
      id: ${name}_grid_rating_current
      name: "Rated Grid Current"

    ac_output_rating_voltage:
      id: ${name}_ac_output_rating_voltage
      name: "Rated AC Output Voltage"
      accuracy_decimals: 0

    ac_output_rating_frequency:
      id: ${name}_ac_output_rating_frequency
      name: "Rated AC Output Frequency"
      accuracy_decimals: 0

    ac_output_rating_current:
      id: ${name}_ac_output_rating_current
      name: "Rated AC Output Current"

    ac_output_rating_apparent_power:
      id: ${name}_ac_output_rating_apparent_power
      name: "Rated AC Output Apparant Power"
      accuracy_decimals: 0

    ac_output_rating_active_power:
      id: ${name}_ac_output_rating_active_power
      name: "Rated AC Output Active Power"
      accuracy_decimals: 0

    battery_rating_voltage:
      id: ${name}_battery_rating_voltage
      name: "Rated Battery Voltage"
      accuracy_decimals: 0

    battery_under_voltage:
      id: ${name}_battery_under_voltage
      name: "Battery Under Voltage" 
      internal: True

    battery_bulk_voltage:
      id: ${name}_battery_bulk_voltage
      name: "Battery Charge Bulk Voltage"
      internal: True

    battery_float_voltage:
      id: ${name}_battery_float_voltage
      name: "Battery Charge Float Voltage"
      internal: True

    current_max_ac_charging_current:
      id: ${name}_current_max_ac_charging_current
      name: "Max AC Charge Current"
      accuracy_decimals: 0
      internal: True

    current_max_charging_current:
      id: ${name}_current_max_charging_current
      name: "Max Charge Current"
      accuracy_decimals: 0
      internal: True

    output_source_priority:
      id: ${name}_output_source_priority
      name: "Output Source Priority"
      accuracy_decimals: 0
      internal: True

    parallel_max_num:
      id: ${name}_parallel_max_num
      name: "Parallel Max Num"
      accuracy_decimals: 0

    battery_redischarge_voltage:
      id: ${name}_battery_redischarge_voltage
      name: "Battery Redischarge Voltage"
      device_class: voltage
      state_class: measurement
      unit_of_measurement: "V"
      internal: True

    pv_ok_condition_for_parallel:
      id: ${name}_pv_ok_condition_for_parallel
      name: "PV OK for Parallel"
      accuracy_decimals: 0

    pv_power_balance:
      id: ${name}_pv_power_balance
      name: "PV Power Balance"
      accuracy_decimals: 0

    battery_recharge_voltage:
      id: ${name}_battery_recharge_voltage
      name: "Battery Recharge Voltage"
      internal: True

    topology:
      id: ${name}_topology_tmp
      name: "Topology Tmp"
      accuracy_decimals: 0
      internal: True
      on_value:
        then:
          lambda: |-
            if (x == 0)
              id(topology).publish_state("Transformerless");
            else
              id(topology).publish_state("Transformer");

    battery_type:
      id: battery_type
      name: "Battery Type"
      accuracy_decimals: 0
      internal: True

    charger_source_priority:
      id: ${name}_charger_source_priority_tmp
      name: "Charger Source Priority Tmp"
      accuracy_decimals: 0
      internal: True
      on_value:
        then:
          lambda: |-
            auto type = "";
            switch(int(x)) {
            case 0:
              type = "Utility First";
              break;
            case 1:
              type = "Solar First";
              break;
            case 2:
              type = "Solar + Utility";
              break;
            case 3:
              auto type = "Only Solar";
              break;
            }
            id(charger_source).publish_state(type);

    input_voltage_range:
      name: "Input Voltage Range Tmp"
      id: inp_range
      accuracy_decimals: 0
      internal: True
      on_value:
        then:
          lambda: |-
            auto type = "";
            switch(int(x)) {
            case 0:
              type = "Appliance"; /* Wide */
              break;
            case 1:
              type = "UPS";       /* Narrow */
              break;
            }
            id(input_voltage_range).publish_state(type);

    machine_type:
      id: ${name}_mtype
      name: "Machine Type Tmp"
      accuracy_decimals: 0
      internal: True
      on_value:
        then:
          lambda: |-
            auto type = "";
            switch(int(x)) {
            case 0:
              type = "Grid Tie";
              break;
            case 1:
              type = "Off Grid";
              break;
            case 10:
              type = "Hybrid";
              break;
            }
            id(machine_type).publish_state(type);

    output_mode:
      id: ${name}_omode
      name: "Output Mode Tmp"
      accuracy_decimals: 0
      internal: True
      on_value:
        then:
          lambda: |-
            auto type = "";
            switch(int(x)) {
            case 0:
              type = "Single Machine";
              break;
            case 1:
              type = "Parallel";
              break;
            case 2:
              type = "Phase 1 of 3";
              break;
            case 3:
              type = "Phase 2 of 3";
              break;
            case 4:
              type = "Phase 3 of 3";
              break;
            }
            id(output_mode).publish_state(type);

  - platform: template
    name: "PV1 Input Power"
    id: pv1_input_power
    device_class: "power"
    unit_of_measurement: "W"
    update_interval: 5s
    accuracy_decimals: 1
    lambda: !lambda |-
      return (id(pv1_input_voltage).state) * (id(pv1_input_current).state);

  - platform: template
    name: "PV2 Input Power"
    id: pv2_input_power
    device_class: "power"
    unit_of_measurement: "W"
    update_interval: 5s
    accuracy_decimals: 1
    lambda: !lambda |-
      return ((id(pv_total_power).state) - (id(pv1_input_power).state));

  - platform: template
    name: "PV2 Input Voltage"
    device_class: "voltage"
    unit_of_measurement: "V"
    update_interval: 5s
    accuracy_decimals: 0
    lambda: |-
      if (id(pv2_input_current).state > 0.0) {
        return id(pv2_input_power).state / id(pv2_input_current).state;
      } else {
        return 0.0;
      }

  - platform: template
    name: "Grid Power"
    id: ${name}_ac_input_power
    unit_of_measurement: "W"
    device_class: power
    state_class: measurement
    accuracy_decimals: 0
    update_interval: 5.0s
    lambda: |-
      // Check if Grid Voltage is present (Inverter is connected to AC Input)
      if (id(${name}_device_mode).state == "Line") {
        float output_power = id(${name}_ac_output_active_power).state;
        float charge_current = id(${name}_battery_charging_current).state;
        float battery_volt = id(${name}_battery_voltage).state;
        
        // Handle potential NaN/Invalid sensor readings safely
        if (std::isnan(output_power)) output_power = 0.0;
        if (std::isnan(charge_current)) charge_current = 0.0;
        if (std::isnan(battery_volt)) battery_volt = 0.0;

        // Calculate battery charging power (Amps * Volts)
        float charging_power = charge_current * battery_volt;
        
        // Total AC Input Power = Load Power + Charging Power
        return output_power + charging_power;
      } else {
        // No grid/generator connected, AC input power is zero
        return 0.0;
      }

text_sensor:
  - platform: pip8048
    pipsolar_id: inverter0

    # last_qpigs:
    #   name: "last qpigs"
    # last_qpgs0:
    #   name: "last qpgs0"
