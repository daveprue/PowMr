    id: charger_source
    name: "Charger Source Prioritty"

  - platform: template
    id: input_voltage_range
    name: "Input Voltage Range"
  
  - platform: template
    id: machine_type
    name: "Machine Type"

  - platform: template
    id: output_mode
    name: "Output Mode"

output:
  - platform: gpio
    id: output_ready_led
    pin: 
      number: GPIO4
      inverted: true
      mode:
        output: true
        pullup: false

  - platform: pip8048
    pipsolar_id: inverter0

    output_source_priority:
      id: send_output_source_priority
      
    battery_recharge_voltage:
      id: send_battery_recharge_voltage

    battery_under_voltage:
      id: send_battery_under_voltage

    battery_bulk_voltage:
      id: send_battery_bulk_voltage

    battery_float_voltage:
      id: send_battery_float_voltage

    battery_type:
      id: send_battery_type

    enable_bypass_on_overload:
      id: output_enable_bypass_on_overload

    disable_bypass_on_overload:
      id: output_disable_bypass_on_overload

    max_ac_charging_current:
      id: send_max_ac_charging

    max_charging_current:
      id: send_max_charging
      
    charger_source_priority:
      id: send_charger_source_priority
      
    battery_redischarge_voltage:
      id: send_battery_redischarge_voltage
      
    input_voltage_range:
      id: send_input_voltage_range

    enable_restart_on_overload:
      id: output_enable_restart_on_overload

    disable_restart_on_overload:
      id: output_disable_restart_on_overload

    enable_menu_returns_home:
      id: output_enable_menu_returns_home

    disable_menu_returns_home:
      id: output_disable_menu_returns_home

    enable_restart_on_over_temp:
      id: output_enable_restart_on_over_temp

    disable_restart_on_over_temp:
      id: output_disable_restart_on_over_temp

    enable_backlight:
      id: output_enable_backlight

    disable_backlight:
      id: output_disable_backlight

    enable_tones:
      id: output_enable_tones

    disable_tones:
      id: output_disable_tones
      
      


select:

  - platform: template
    name: "Inverter Mode"
    id: inv_source_menu
    options:
      - "Solar-Utility-Battery (SUB)"
      - "Solar-Battery-Utility (SBU)"
    update_interval: 5s
    lambda: !lambda |-
      auto var = id(${name}_output_source_priority).state;
      return id(inv_source_menu).at(var);
    set_action:
      then:
        - logger.log: "Setting Inverter Mode"
        - output.pipsolar.set_level:
            id: send_output_source_priority
            value: !lambda |-
              return id(inv_source_menu).index_of(x).value();
      
  - platform: template
    name: "AC Input Voltage Range"
    id: select_input_voltage_range
    options:
      - "Appliance (90v - 280v)"
      - "UPS (170v - 280v)"
    update_interval: 5s
    lambda: !lambda |-
      auto var = id(inp_range).state;
      return id(select_input_voltage_range).at(var);
    set_action:
      then:
        - logger.log: "Setting AC Input Level"
        - output.pipsolar.set_level:
            id: send_input_voltage_range
            value: !lambda |-
              return id(select_input_voltage_range).index_of(x).value();


      
  - platform: template
    name: "Battery Type"
    id: select_battery_type
    options:
      - "AGM Lead Acid"
      - "Flooded Lead Acid"
      - "User Defined"
      - "LIA Protocol"
      - "Pylontech"
      - "Techfine"
      - "Growatt"
      - "LIB Protocol"
      - "LIC 3rd Party"
      - "Felicity"
    update_interval: 5s
    lambda: !lambda |-
      auto var = int(id(battery_type).state);
      return id(select_battery_type).at(var);
    set_action:
      then:
        - logger.log: "Setting Battery Type"
        - lambda: 'id(battery_type).publish_state(id(select_battery_type).index_of(x).value());'
        - output.pipsolar.set_level:
            id: send_battery_type
            value: !lambda |-
              return id(select_battery_type).index_of(x).value();


number:
  - platform: template
    name: "Charge Bulk"
    lambda: !lambda return id(${name}_battery_bulk_voltage).state;
    update_interval: 5s
    entity_category: "CONFIG"
    min_value: 48.0
    max_value: 62.0
    step: 0.1
    mode: box
    device_class: voltage
    unit_of_measurement: "V"
    set_action:
      - logger.log: "Setting Battery Bulk Charge Voltage"
      - output.pipsolar.set_level:
          id: send_battery_bulk_voltage
          value: !lambda return(x);

  - platform: template
    name: "Charge Float"
    lambda: !lambda return id(${name}_battery_float_voltage).state;
    entity_category: "CONFIG"
    update_interval: 5s
    min_value: 48
    max_value: 62
    step: 0.1
    mode: box
    device_class: voltage
    unit_of_measurement: "V"
    set_action:
      - logger.log: "Setting Battery Float Voltage"
      - output.pipsolar.set_level:
          id: send_battery_float_voltage
          value: !lambda return(x);

  - platform: template
    name: "Charge Start"
    lambda: !lambda return id(${name}_battery_recharge_voltage).state;
    entity_category: "CONFIG"
    update_interval: 5s
    min_value: 44
    max_value: 57.2
    step: 0.1
    mode: box
    device_class: voltage
    unit_of_measurement: "V"
    set_action:
      - logger.log: "Setting Charge Start Voltage"
      - output.pipsolar.set_level:
          id: send_battery_recharge_voltage
          value: !lambda return(x);

  - platform: template
    name: "Charge Stop"
    lambda: !lambda return id(${name}_battery_redischarge_voltage).state;
    entity_category: "CONFIG"
    update_interval: 5s
    min_value: 44
    max_value: 56.8
    step: 0.1
    mode: box
    device_class: voltage
    unit_of_measurement: "V"
    set_action:
      - logger.log: "Setting Charge Stop Voltage"
      - output.pipsolar.set_level:
          id: send_battery_redischarge_voltage
          value: !lambda return(x);

  - platform: template
    name: "Max AC Charge"
    lambda: !lambda return id(${name}_current_max_ac_charging_current).state;
    entity_category: "CONFIG"
    update_interval: 5s
    min_value: 10
    max_value: 150
    step: 10
    mode: box
    device_class: current
    unit_of_measurement: "A"
    set_action:
      - logger.log: "Setting Max AC Charge Current"
      - output.pipsolar.set_level:
          id: send_max_ac_charging
          value: !lambda return(x);
      
  - platform: template
    name: "Max Total Charge"
    lambda: !lambda return id(${name}_current_max_charging_current).state;
    entity_category: "CONFIG"
    update_interval: 5s
    min_value: 10
    max_value: 150
    step: 10
    mode: box
    device_class: current
    unit_of_measurement: "A"
    set_action:
      - logger.log: "Setting Total Max Charge Current"
      - output.pipsolar.set_level:
          id: send_max_charging
          value: !lambda return(x);

  - platform: template
    name: "Battery UVP"
    lambda: !lambda return id(${name}_battery_under_voltage).state;
    entity_category: "CONFIG"
    update_interval: 5s
    min_value: 40
    max_value: 54
    step: 0.1
    mode: box
    device_class: voltage
    unit_of_measurement: "V"
    set_action:
      - logger.log: "Setting Battery Under Voltage Protection"
      - output.pipsolar.set_level:
          id: send_battery_under_voltage
          value: !lambda return(x);

switch:
  - platform: template
    name: " Bypass on Battery Overload"
    lambda: !lambda return id(binary_sensor_bypass_on_battery_overload).state;
    turn_on_action:
      - logger.log: "Turning On Bypass on Battery Overload"
      - output.pipsolar.set_level:
          id: output_enable_bypass_on_overload
          value: !lambda return(0);
    turn_off_action:
      - logger.log: "Turning Off Bypass on Battery Overload"
      - output.pipsolar.set_level:
          id: output_disable_bypass_on_overload
          value: !lambda return(0);

  - platform: template
    name: " Keypad Tones"
    lambda: !lambda return id(binary_sensor_alarm).state;
    turn_on_action:
      - logger.log: "Turning On Key Tones"
      - output.pipsolar.set_level:
          id: output_enable_tones
          value: !lambda return(0);
    turn_off_action:
      - logger.log: "Turning Off Key Tones"
      - output.pipsolar.set_level:
          id: output_disable_tones
          value: !lambda return(0);

  - platform: template
    name: " Menu Returns Home"
    lambda: !lambda return id(binary_sensor_lcd_escape_to_default).state;
    turn_on_action:
      - logger.log: "Setting Menu Returns Home"
      - output.pipsolar.set_level:
          id: output_enable_menu_returns_home
          value: !lambda return(0);
    turn_off_action:
      - output.pipsolar.set_level:
          id: output_disable_menu_returns_home
          value: !lambda return(0);

  - platform: template
    name: " Remote Switch"
    lambda: !lambda return id(binary_sensor_switch_on).state;
    turn_on_action:
      - logger.log: "Turning On Remote Switch"
    turn_off_action:
      - logger.log: "Turning Off Remote Switch"

  - platform: template
    name: " Restart on Over Temp"
    lambda: !lambda return id(binary_sensor_restart_on_over_temp).state;
    turn_on_action:
      - logger.log: "Turning On Restart on Overtemp"
      - output.pipsolar.set_level:
          id: output_enable_restart_on_over_temp
          value: !lambda return(0);
    turn_off_action:
      - logger.log: "Turning Off Restart on Overtemp"
      - output.pipsolar.set_level:
          id: output_disable_restart_on_over_temp
          value: !lambda return(0);

    # - platform: template
    #   name: " Energy Saving Mode"
    #   lambda: !lambda if (id(binary_sensor_power_saving).state) return 1; else return 0;
