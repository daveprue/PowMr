  - platform: template
    name: " Restart on Overload"
    lambda: !lambda return id(binary_sensor_restart_on_overload).state;
    turn_on_action:
      - logger.log: "Turning On Restart on Overload"
      - output.pipsolar.set_level:
          id: output_enable_restart_on_overload
          value: !lambda return(0);
    turn_off_action:
      - logger.log: "Turning Off Restart on Overload"
      - output.pipsolar.set_level:
          id: output_disable_restart_on_overload
          value: !lambda return(0);

  - platform: template
    name: " Screen Backlight"
    lambda: !lambda return id(binary_sensor_backlight_on).state;
    turn_on_action:
      - logger.log: "Turning On Backlight"
      - output.pipsolar.set_level:
          id: output_enable_backlight
          value: !lambda return(0);
    turn_off_action:
      - logger.log: "Turning Off Backlight"
      - output.pipsolar.set_level:
          id: output_disable_backlight
          value: !lambda return(0);

binary_sensor:
    - platform: status
      name: "Inverter API Status"
      id: api_status
      on_state_change:
        then:
          if:
            condition:
              binary_sensor.is_on: api_status
            then:
              light.turn_on: ready_led
            else:
              light.turn_off: ready_led

    - platform: pip8048
      pipsolar_id: inverter0

      overload_restart_function:
        id: binary_sensor_restart_on_overload
        trigger_on_initial_state: true

      overload_bypass_function:
        id: binary_sensor_bypass_on_battery_overload
        trigger_on_initial_state: true

      power_saving:
        id: binary_sensor_power_saving
        trigger_on_initial_state: true

      lcd_escape_to_default:
        id: binary_sensor_lcd_escape_to_default
        trigger_on_initial_state: true

      switch_on:
        id: binary_sensor_switch_on
        trigger_on_initial_state: true

      over_temperature_restart_function:
        id: binary_sensor_restart_on_over_temp
        trigger_on_initial_state: true

      backlight_on:
        id: binary_sensor_backlight_on
        trigger_on_initial_state: true

      silence_buzzer_open_buzzer:
        id: binary_sensor_alarm
        trigger_on_initial_state: true
